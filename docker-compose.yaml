services:
  qdrant:
    container_name: qdrant
    image: qdrant/qdrant:v1.18.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: bash -c ':> /dev/tcp/localhost/6333'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - qdrant-net
  
  postgres:
    container_name: qdrant-loader-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-qdrant_loader}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
      - POSTGRES_DB=${POSTGRES_DB:-qdrant_loader}
    ports:
      # Bind to loopback only: internal services reach Postgres over qdrant-net;
      # this avoids exposing the DB to the host's network.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qdrant_loader} -d ${POSTGRES_DB:-qdrant_loader}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qdrant-net

  qdrant-loader:
    container_name: qdrant-loader
    build:
      context: .
      dockerfile: Dockerfile.qdrant-loader
    image: qdrant-loader:latest
    restart: unless-stopped
    environment:
      - STATE_DB_URL=${STATE_DB_URL:-postgresql+asyncpg://${POSTGRES_USER:-qdrant_loader}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qdrant_loader}}
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - qdrant-net

  qdrant-loader-mcp-server:
    container_name: qdrant-loader-mcp-server
    build:
      context: .
      dockerfile: Dockerfile.qdrant-loader-mcp-server
    image: qdrant-loader-mcp-server:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_EMBEDDING_MODEL=${LLM_EMBEDDING_MODEL}
      - LLM_CHAT_MODEL=${LLM_CHAT_MODEL}
      - MCP_LOG_LEVEL=${MCP_LOG_LEVEL:-INFO}
      - MCP_LOG_FILE=${MCP_LOG_FILE:-mcp.log}
      - MCP_DISABLE_CONSOLE_LOGGING=${MCP_DISABLE_CONSOLE_LOGGING:-false}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - qdrant-net

volumes:
  qdrant_data:
    driver: local
  postgres_data:
    driver: local

networks:
  qdrant-net:
    driver: bridge

