# =============================================================================
# Configuration Validation Notes
# =============================================================================

# Required Environment Variables:
# - At least one authentication method must be configured
# - For service_principal: SHAREPOINT_TENANT_ID, SHAREPOINT_CLIENT_ID, SHAREPOINT_CLIENT_SECRET
# - For certificate: SHAREPOINT_TENANT_ID, SHAREPOINT_CLIENT_ID, SHAREPOINT_CERT_PATH
# - For ntlm: SHAREPOINT_DOMAIN, SHAREPOINT_USERNAME, SHAREPOINT_PASSWORD

# Performance Recommendations:
# - Start with conservative rate limits and increase based on monitoring
# - Use specific_sites for initial testing, expand to site_collection/tenant later
# - Enable incremental_sync for large deployments
# - Monitor memory usage with large file processing

# Security Best Practices:
# - Use service principal or certificate authentication for production
# - Enable permission tracking for compliance requirements
# - Set appropriate file size limits to prevent resource exhaustion
# - Use environment variables for all sensitive configuration

# Troubleshooting:
# - Set SHAREPOINT_LOG_LEVEL=DEBUG for detailed logging
# - Start with small site collections to validate configuration
# - Monitor rate limiting and adjust limits as needed
# - Check authentication tokens are not expired 