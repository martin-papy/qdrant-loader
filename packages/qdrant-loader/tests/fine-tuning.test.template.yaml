# Test Fine-Tuning Configuration Template
# Copy this file to fine-tuning.yaml and customize it for your test environment
# Environment variables can be used with ${VARIABLE_NAME} syntax

# Configuration Notes for Testing:
# 
# 1. Test Processing Parameters:
#    - Smaller chunk sizes for faster test execution
#    - Reduced batch sizes to minimize resource usage
#    - Lower file size limits for predictable test data
#
# 2. Test Performance Tuning:
#    - Smaller worker pools for controlled test execution
#    - Shorter timeouts for faster test feedback
#    - Reduced concurrency to avoid resource conflicts
#
# 3. Test Algorithm Settings:
#    - Simplified search parameters for consistent results
#    - Reduced complexity for faster processing
#    - Deterministic settings where possible
#
# 4. Test Caching and Optimization:
#    - Smaller cache sizes for memory efficiency
#    - Shorter TTL settings for test isolation
#    - Debug flags enabled for troubleshooting
#
# 5. Environment Variables:
#    - Use environment variables for test-specific overrides
#    - Fallback to safe test defaults
#    - Compatible with CI/CD test environments

# Text chunking configuration for tests
# Smaller chunks for faster processing and predictable results
chunking:
  chunk_size: 500       # Smaller chunks for faster tests (vs 1500 in production)
  chunk_overlap: 50     # Reduced overlap for efficiency (vs 200 in production)

# File conversion configuration for tests
# Reduced limits and timeouts for faster test execution
file_conversion:
  # Maximum file size for conversion (in bytes) - 5MB for tests
  max_file_size: 5242880  # 5MB (vs 50MB in production)
  
  # Timeout for conversion operations (in seconds) - shorter for tests
  conversion_timeout: 30  # 30 seconds (vs 5 minutes in production)
  
  # MarkItDown specific settings for tests
  markitdown:
    # Disable LLM integration for tests to avoid API calls and ensure deterministic results
    enable_llm_descriptions: false
    # LLM model for image descriptions (not used in tests)
    llm_model: "${TEST_LLM_MODEL:-gpt-4o-mini}"
    # LLM endpoint (not used in tests)
    llm_endpoint: "${TEST_LLM_ENDPOINT:-https://api.openai.com/v1}"
    # API key for LLM service (not used in tests since LLM descriptions are disabled)
    llm_api_key: "${TEST_OPENAI_API_KEY:-test-key}"

# Processing configuration for tests
# Reduced batch sizes and worker counts for controlled test execution
processing:
  # Batch processing settings
  batch_size: 5           # Small batches for tests (vs larger production batches)
  max_concurrent_batches: 2  # Limited concurrency for tests
  
  # Worker pool settings
  max_workers: 2          # Fewer workers for tests
  worker_timeout: 10      # Shorter timeout for tests (seconds)
  
  # Memory management
  max_memory_usage: 0.5   # 50% memory limit for tests
  gc_threshold: 100       # More frequent garbage collection

# Search and retrieval configuration for tests
# Simplified settings for consistent test results
search:
  # Vector search settings
  similarity_threshold: 0.7  # Standard threshold for tests
  max_results: 10           # Fewer results for faster tests
  
  # Reranking settings (simplified for tests)
  enable_reranking: false   # Disabled for faster tests
  rerank_top_k: 5          # Smaller rerank set
  
  # Caching settings
  cache_size: 100          # Small cache for tests
  cache_ttl: 300           # 5 minutes TTL for tests

# Performance monitoring for tests
# Reduced complexity and shorter intervals
monitoring:
  # Metrics collection
  enable_metrics: true     # Enable for test validation
  metrics_interval: 5      # 5 seconds for tests
  
  # Resource monitoring
  monitor_resources: false # Disabled for simpler tests
  resource_check_interval: 10  # 10 seconds if enabled
  
  # Logging settings
  log_level: "INFO"        # Standard logging for tests
  log_performance: false   # Disabled for cleaner test output

# Optimization settings for tests
# Conservative settings for reliable test execution
optimization:
  # Parallel processing
  enable_parallel_processing: false  # Disabled for deterministic tests
  max_parallel_tasks: 1             # Single-threaded for tests
  
  # Caching strategies
  enable_result_caching: true       # Enable for test efficiency
  cache_compression: false          # Disabled for simplicity
  
  # Memory optimization
  enable_memory_optimization: true  # Enable for test stability
  memory_cleanup_interval: 30       # 30 seconds cleanup

# Debug and testing specific settings
debug:
  # Debug flags
  enable_debug_logging: false       # Disabled by default for cleaner output
  debug_chunk_processing: false     # Can be enabled for specific tests
  debug_embedding_generation: false # Can be enabled for specific tests
  
  # Test data settings
  use_test_data: true               # Enable test data mode
  test_data_size_limit: 1000        # Limit test data size (KB)
  
  # Validation settings
  strict_validation: true           # Enable strict validation for tests
  validate_embeddings: false        # Disabled for faster tests
  validate_chunks: true             # Enable chunk validation 