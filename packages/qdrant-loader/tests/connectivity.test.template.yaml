# Test Connectivity Configuration Template
# Copy this file to connectivity.yaml and customize it for your test environment
# Environment variables can be used with ${VARIABLE_NAME} syntax

# Configuration Notes for Testing:
# 
# 1. Test Database Connections:
#    - Uses localhost defaults suitable for CI/CD environments
#    - Simplified configuration for faster test execution
#    - In-memory or temporary databases where possible
#
# 2. Test LLM Provider Connections:
#    - Uses test API keys or mock endpoints
#    - Reduced rate limits for faster test execution
#    - Fallback configurations for offline testing
#
# 3. Test Authentication Settings:
#    - Uses test credentials or environment variables
#    - Safe defaults that don't require real API keys
#    - Mock authentication for unit tests
#
# 4. Environment Variables:
#    - All sensitive values use environment variables
#    - Fallback to safe test defaults when env vars not set
#    - Compatible with CI/CD test environments

# QDrant vector database configuration for tests
qdrant:
  url: "${QDRANT_URL:-http://localhost:6333}"
  api_key: "${QDRANT_API_KEY:-}"  # Optional API key, empty for local testing
  collection_name: "${QDRANT_COLLECTION_NAME:-test_collection}"  # Test collection name

# Embedding service configuration for tests
# Configured for both OpenAI and local testing scenarios
embedding:
  provider: "${EMBEDDING_PROVIDER:-openai}"  # Required field: openai, local, etc.
  endpoint: "${EMBEDDING_ENDPOINT:-https://api.openai.com/v1}"  # OpenAI endpoint or local endpoint
  model: "${EMBEDDING_MODEL:-text-embedding-3-small}"  # Test-appropriate model
  api_key: "${OPENAI_API_KEY:-test-key}"  # API key with test fallback
  vector_size: 1536  # Vector size for OpenAI text-embedding-3-small
  tokenizer: "cl100k_base"  # Tokenizer for OpenAI models
  # Token limits for test efficiency
  max_tokens_per_request: 1000  # Reduced for faster tests
  max_tokens_per_chunk: 1000    # Reduced for faster tests

# Neo4j Configuration for tests (optional)
# Only needed when testing Graphiti features
neo4j:
  uri: "${NEO4J_URI:-bolt://localhost:7687}"
  user: "${NEO4J_USER:-neo4j}"
  password: "${NEO4J_PASSWORD:-test-password}"
  database: "${NEO4J_DATABASE:-neo4j}"
  max_connection_lifetime: 300  # Shorter for tests
  max_connection_pool_size: 5   # Smaller pool for tests
  connection_acquisition_timeout: 10  # Shorter timeout for tests
  trusted_certificates: "TRUST_ALL_CERTIFICATES"
  encrypted: false

# Graphiti Knowledge Graph Configuration for tests
# Disabled by default for faster test execution
graphiti:
  enabled: false  # Disabled for most tests
  debug_mode: true  # Enable debug mode for test troubleshooting
  
  # LLM Configuration for Graphiti tests
  llm:
    provider: "${GRAPHITI_LLM_PROVIDER:-openai}"
    model: "${GRAPHITI_LLM_MODEL:-gpt-4o-mini}"
    max_tokens: 1000  # Reduced for tests
    temperature: 0.0  # Deterministic for tests
    api_key: "${GRAPHITI_LLM_API_KEY:-test-key}"
    endpoint: "${GRAPHITI_LLM_ENDPOINT:-https://api.openai.com/v1}"
  
  # Embedder Configuration for tests
  embedder:
    provider: "${GRAPHITI_EMBEDDER_PROVIDER:-openai}"
    model: "${GRAPHITI_EMBEDDER_MODEL:-text-embedding-3-small}"
    dimensions: null  # Use model default
    api_key: "${GRAPHITI_EMBEDDER_API_KEY:-test-key}"
    endpoint: "${GRAPHITI_EMBEDDER_ENDPOINT:-https://api.openai.com/v1}"
  
  # Operational Settings for tests
  operational:
    timeout_seconds: 10  # Shorter timeout for tests

# State management configuration for tests
# Uses in-memory database for fast, isolated tests
state_management:
  database_path: "${STATE_DB_PATH:-:memory:}"  # In-memory SQLite for tests
  table_prefix: "test_qdrant_loader_"  # Test-specific table prefix
  connection_pool:
    size: 1      # Single connection for tests
    timeout: 5   # Short timeout for tests 