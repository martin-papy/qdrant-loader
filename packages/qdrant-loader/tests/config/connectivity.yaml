# Test connectivity configuration
# Minimal configuration for unit and integration tests

# QDrant vector database configuration for tests
qdrant:
  url: "${QDRANT_URL}"
  api_key: "${QDRANT_API_KEY}"
  collection_name: "${QDRANT_COLLECTION_NAME}"

embedding:
  endpoint: "${EMBEDDING_ENDPOINT}" # Optionnal. Defines the endpoint to use for embedding. Defaults to OpenAI endpoint.
  model: "${EMBEDDING_MODEL}"  # Embedding model to use. Could be BAAI/bge-small-en-v1.5 (exemple for local use) or text-embedding-3-small (for OpenAI use)
  provider: "${EMBEDDING_PROVIDER}"  # Embedding provider to use. Could be openai, anthropic, etc.
  batch_size: 100                  # Number of chunks to process in one batch
  vector_size: 1536                # Optionnal. Vector size for the embedding model (384 for BAAI/bge-small-en-v1.5, 1536 for OpenAI text-embedding-3-small)
  tokenizer: "${EMBEDDING_TOKENIZER:-none}"         # Optionnal. Tokenizer to use for token counting. Use 'cl100k_base' for OpenAI models or 'none' for other models.
  max_tokens_per_request: 8000     # Maximum total tokens per API request (leave buffer below model limit)
  max_tokens_per_chunk: 8000       # Maximum tokens per individual chunk (should match model's context limit)


# Neo4j Configuration for tests (optional)
# Only needed when testing Graphiti features
neo4j:
  uri: "${NEO4J_URI}"
  user: "${NEO4J_USER}"
  password: "${NEO4J_PASSWORD}"
  database: "${NEO4J_DATABASE}"
  max_connection_lifetime: 300  # Shorter for tests
  max_connection_pool_size: 5   # Smaller pool for tests
  connection_acquisition_timeout: 10  # Shorter timeout for tests
  trusted_certificates: "TRUST_ALL_CERTIFICATES"
  encrypted: false

# State management configuration for tests
state_management:
  database_path: ${STATE_DB_PATH:-:memory:}
  table_prefix: "test_qdrant_loader_"
  connection_pool:
    size: 1
    timeout: 5
