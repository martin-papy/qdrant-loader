# Test Projects Configuration Template
# Copy this file to projects.yaml and customize it for your test environment
# Environment variables can be used with ${VARIABLE_NAME} syntax

# Configuration Notes for Testing:
# 
# 1. Test Project Structure:
#    - Simplified projects suitable for unit and integration tests
#    - Uses test data sources and mock endpoints
#    - Minimal configuration for faster test execution
#
# 2. Test Collection Strategy:
#    - All test projects share the same test collection
#    - Project isolation through test-specific project_ids
#    - Easy cleanup and reset between test runs
#
# 3. Test Source Configuration:
#    - Uses local test files and mock endpoints
#    - Reduced complexity for reliable test execution
#    - Safe defaults that don't require external services
#
# 4. Environment Variables:
#    - All external dependencies use environment variables
#    - Fallback to safe test defaults when env vars not set
#    - Compatible with CI/CD test environments
#
# 5. Test Data Management:
#    - Uses test fixtures and sample data
#    - Predictable data for consistent test results
#    - Easy to reset and reproduce test scenarios

# Multi-project configuration for tests
# Define test projects with simplified configurations
projects:
  # Primary test project for most unit tests
  test-project:
    project_id: "test-project"
    display_name: "Test Project"
    description: "Primary test project for unit and integration tests"
    
    # Test-specific source configurations
    sources:
      # Local file sources for testing
      localfile:
        test-files:
          base_url: "file://tests/fixtures"  # Test fixtures directory
          include_paths:
            - "**/*.md"
            - "**/*.txt"
            - "**/*.json"
          exclude_paths:
            - "**/.*"  # Exclude hidden files
            - "**/temp/**"
          file_types:
            - "*.md"
            - "*.txt"
            - "*.json"
            - "*.yaml"
          max_file_size: 1048576  # 1MB limit for tests

          # File conversion settings for tests
          enable_file_conversion: true
          download_attachments: false  # Disabled for faster tests

      # Git repository sources for testing
      git:
        test-repo:
          base_url: "${TEST_REPO_URL:-https://github.com/octocat/Hello-World.git}"
          branch: "main"
          token: "${TEST_REPO_TOKEN:-}"  # Optional for public repos
          include_paths:
            - "*.md"
            - "*.txt"
          exclude_paths:
            - ".git/**"
            - "node_modules/**"
          file_types:
            - "*.md"
            - "*.txt"
          max_file_size: 524288  # 512KB for tests
          depth: 1  # Shallow clone for tests

          # File conversion settings for tests
          enable_file_conversion: false  # Disabled for faster tests

      # Public documentation sources for testing
      publicdocs:
        test-docs:
          base_url: "${TEST_DOCS_URL:-https://httpbin.org/html}"  # Simple test endpoint
          version: "test"
          content_type: "html"
          path_pattern: "*.html"
          exclude_paths: []
          
          # Simple selectors for test content
          selectors:
            content: "body"
            remove: 
              - "script"
              - "style"
            code_blocks: "pre code"

          # File conversion settings for tests
          enable_file_conversion: false  # Disabled for faster tests
          download_attachments: false

      # Confluence sources for testing (requires credentials)
      confluence:
        test-confluence:
          base_url: "${TEST_CONFLUENCE_URL:-https://test.atlassian.net/wiki}"
          deployment_type: "cloud"
          space_key: "${TEST_CONFLUENCE_SPACE_KEY:-TEST}"
          content_types:
            - "page"
          include_labels: []
          exclude_labels: []
          token: "${TEST_CONFLUENCE_TOKEN:-test-token}"
          email: "${TEST_CONFLUENCE_EMAIL:-test@example.com}"

          # File conversion settings for tests
          enable_file_conversion: false  # Disabled for faster tests
          download_attachments: false

      # JIRA sources for testing (requires credentials)
      jira:
        test-jira:
          base_url: "${TEST_JIRA_URL:-https://test.atlassian.net}"
          deployment_type: "cloud"
          project_key: "${TEST_JIRA_PROJECT_KEY:-TEST}"
          requests_per_minute: 30  # Reduced for tests
          page_size: 10  # Smaller pages for tests
          process_attachments: false  # Disabled for faster tests
          track_last_sync: false  # Disabled for tests
          token: "${TEST_JIRA_TOKEN:-test-token}"
          email: "${TEST_JIRA_EMAIL:-test@example.com}"

          # File conversion settings for tests
          enable_file_conversion: false  # Disabled for faster tests
          download_attachments: false

  # Secondary test project for multi-project testing
  test-project-2:
    project_id: "test-project-2"
    display_name: "Test Project 2"
    description: "Secondary test project for multi-project scenarios"
    
    sources:
      # Minimal local file source
      localfile:
        test-files-2:
          base_url: "file://tests/fixtures/project2"
          include_paths:
            - "*.md"
          exclude_paths: []
          file_types:
            - "*.md"
          max_file_size: 524288  # 512KB

          # File conversion settings for tests
          enable_file_conversion: false
          download_attachments: false

  # Minimal test project for basic functionality testing
  minimal-test:
    project_id: "minimal-test"
    display_name: "Minimal Test Project"
    description: "Minimal project for basic functionality tests"
    
    sources:
      # Single local file source
      localfile:
        minimal-files:
          base_url: "file://tests/fixtures/minimal"
          include_paths:
            - "*.txt"
          exclude_paths: []
          file_types:
            - "*.txt"
          max_file_size: 102400  # 100KB

          # File conversion settings for tests
          enable_file_conversion: false
          download_attachments: false 