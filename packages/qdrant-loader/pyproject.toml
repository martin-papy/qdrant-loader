[build-system]
requires = [
    "setuptools>=61.0",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name = "qdrant-loader"
version = "0.4.10"
description = "A tool for collecting and vectorizing technical content from multiple sources and storing it in a QDrant vector database."
readme = "README.md"
requires-python = ">=3.12"
license = "GPL-3.0"
keywords = [
    "qdrant",
    "vector-database",
    "embeddings",
    "document-processing",
    "multi-project",
    "rag",
    "semantic-search",
]
authors = [
    { name = "Martin Papy", email = "martin.papy@cbtw.tech" },
]
dependencies = [
    "click>=8.1.7",
    "requests>=2.31.0",
    "tomli>=2.0.1",
    "tomli-w>=1.0.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "structlog>=23.0.0",
    "httpx>=0.24.0",
    "openai>=1.0.0",
    "qdrant-client>=1.7.0",
    "neo4j>=5.26.0",
    "PyYAML>=6.0.0",
    "beautifulsoup4>=4.12.0",
    "chardet>=5.2.0",
    "tiktoken>=0.5.0",
    "langchain>=0.3.0",
    "langchain-core>=0.3.0",
    "langchain-community>=0.0.38",
    "numpy>=1.26.0,<2.0.0",
    "GitPython>=3.1.40",
    "atlassian-python-api>=3.41.0",
    "tqdm>=4.66.0",
    "SQLAlchemy>=2.0.0",
    "alembic>=1.12.0",
    "appdirs>=1.4.4",
    "aiosqlite>=0.19.0",
    "greenlet>=3.0.0",
    "spacy>=3.7.0",
    "statsd>=4.0.0",
    "nltk>=3.8.0",
    "gensim>=4.3.0",
    "rank-bm25>=0.2.2",
    "faiss-cpu>=1.7.4",
    "psutil>=5.9.0",
    "tree-sitter-languages>=1.10.0",
    "tree-sitter<0.21",
    "markitdown[all]>=0.1.2",
    "rich>=13.0.0",
    "packaging>=21.0",
    "graphiti-core>=0.11.6",
    "watchdog>=3.0.0",
    "apscheduler>=3.10.0",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Database :: Database Engines/Servers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Text Processing :: Indexing",
    "Topic :: Text Processing :: Linguistic",
    "Environment :: Console",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://qdrant-loader.net"
Documentation = "https://qdrant-loader.net/docs/packages/qdrant-loader/README.html"
Repository = "https://github.com/martin-papy/qdrant-loader"
Issues = "https://github.com/martin-papy/qdrant-loader/issues"

[project.scripts]
qdrant-loader = "qdrant_loader.main:cli"

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-mock>=3.10.0",
    "pytest-asyncio>=0.21.0",
    "pytest-timeout>=2.3.0",
    "responses>=0.24.1",
    "requests_mock>=1.11.0",
    "sqlite-web>=0.6.4",
    "py-spy",
    "snakeviz",
    "memory_profiler",
    "prometheus_client",
    "bandit>=1.7.8",
    "radon>=6.0.1",
    "vulture>=2.11",
]

[tool.setuptools.packages.find]
where = [
    "src",
]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --strict-config"
testpaths = ["tests"]
markers = [
    "integration: marks tests as integration tests (may be slow)",
    "unit: marks tests as unit tests",
    "slow: marks tests as slow",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore:Importing 'parser.split_arg_string' is deprecated:DeprecationWarning:click.parser",
    "ignore:Importing 'parser.split_arg_string' is deprecated:DeprecationWarning:spacy.cli._util",
    "ignore:Importing 'parser.split_arg_string' is deprecated:DeprecationWarning:weasel.util.config",
]
