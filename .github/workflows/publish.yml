name: Publish Packages to PyPI

on:
  release:
    types: [created]

# Set minimal permissions for the workflow
permissions:
  contents: read

jobs:
  determine-package:
    name: Determine which package to publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish-loader: ${{ steps.check.outputs.publish-loader }}
      publish-mcp-server: ${{ steps.check.outputs.publish-mcp-server }}
      publish-core: ${{ steps.check.outputs.publish-core }}
    steps:
      - name: Check release tag
        id: check
        run: |
          if [[ "${{ github.event.release.tag_name }}" == qdrant-loader-mcp-server-* ]]; then
            echo "publish-loader=false" >> $GITHUB_OUTPUT
            echo "publish-mcp-server=true" >> $GITHUB_OUTPUT
            echo "publish-core=false" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.release.tag_name }}" == qdrant-loader-core-* ]]; then
            echo "publish-loader=false" >> $GITHUB_OUTPUT
            echo "publish-mcp-server=false" >> $GITHUB_OUTPUT
            echo "publish-core=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.release.tag_name }}" == qdrant-loader-* ]]; then
            echo "publish-loader=true" >> $GITHUB_OUTPUT
            echo "publish-mcp-server=false" >> $GITHUB_OUTPUT
            echo "publish-core=false" >> $GITHUB_OUTPUT
          else
            echo "publish-loader=false" >> $GITHUB_OUTPUT
            echo "publish-mcp-server=false" >> $GITHUB_OUTPUT
            echo "publish-core=false" >> $GITHUB_OUTPUT
          fi

  publish-loader:
    name: Publish QDrant Loader to PyPI
    runs-on: ubuntu-latest
    needs: determine-package
    if: needs.determine-package.outputs.publish-loader == 'true'
    environment:
      name: ${{ vars.PYPI_ENVIRONMENT || 'pypi-publish' }}
      url: https://pypi.org/p/qdrant-loader
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"

      - name: Build loader package
        run: |
          cd packages/qdrant-loader
          uv build --out-dir dist/
          
      - name: Publish loader package to PyPI
        id: publish_loader
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/qdrant-loader/dist/

      - name: Notify teams on success
        if: ${{ steps.publish_loader.conclusion == 'success' }}
        continue-on-error: true
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          URL: https://pypi.org/p/qdrant-loader
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg tag_name "$TAG_NAME" \
            --arg actor "$GITHUB_ACTOR" \
            --arg url "$URL" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                content: {
                  type: "AdaptiveCard",
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  version: "1.4",
                  body: [
                    { type: "TextBlock", weight: "Bolder", size: "Medium", text: "QDrant Loader package published to PyPI successfully", color: "Good" },
                    { type: "FactSet", facts: [
                      { title: "Tag name", value: $tag_name },
                      { title: "Triggered by", value: $actor },
                      { title: "URL", value: $url }
                    ]}
                  ]
                }
              }]
            }')
          curl -fsS --max-time 30 -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK"

      - name: Notify teams on failure
        if: ${{ always() && steps.publish_loader.conclusion == 'failure' }}
        continue-on-error: true
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg tag_name "$TAG_NAME" \
            --arg actor "$GITHUB_ACTOR" \
            --arg url "$RUN_URL" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                content: {
                  type: "AdaptiveCard",
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  version: "1.4",
                  body: [
                    { type: "TextBlock", weight: "Bolder", size: "Medium", text: "QDrant Loader package published to PyPI FAILED", color: "Attention" },
                    { type: "FactSet", facts: [
                      { title: "Tag name", value: $tag_name },
                      { title: "Triggered by", value: $actor },
                      { title: "Logs", value: $url }
                    ]}
                  ]
                }
              }]
            }')
          curl --fail --silent --show-error --max-time 30 \
            -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK"

  publish-mcp-server:
    name: Publish MCP Server to PyPI
    runs-on: ubuntu-latest
