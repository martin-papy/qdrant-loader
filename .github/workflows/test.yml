name: Test and Coverage

on:
  push:
    branches: [main, develop, feature/*, bugfix/*, release/*]
  pull_request:
    branches: [main, develop, feature/*, bugfix/*, release/*]

permissions:
  contents: read
  actions: read

concurrency:
  group: "test-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test-loader:
    name: Test QDrant Loader
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          # Install ffmpeg for full MarkItDown audio processing capabilities
          # This ensures comprehensive file conversion testing including audio files
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/qdrant-loader[dev]

      - name: Create .env.test file for loader
        run: |
          cd packages/qdrant-loader
          cp tests/config/.env.test.template tests/config/.env.test

          # Check if required secrets are set
          if [ -z "${{ secrets.QDRANT_URL }}" ]; then
            echo "Error: QDRANT_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.QDRANT_API_KEY }}" ]; then
            echo "Error: QDRANT_API_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.QDRANT_COLLECTION_NAME }}" ]; then
            echo "Error: QDRANT_COLLECTION_NAME secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "Error: OPENAI_API_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.NEO4J_URI }}" ]; then
            echo "Error: NEO4J_URI secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.NEO4J_USER }}" ]; then
            echo "Error: NEO4J_USER secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.NEO4J_PASSWORD }}" ]; then
            echo "Error: NEO4J_PASSWORD secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.NEO4J_DATABASE }}" ]; then
            echo "Error: NEO4J_DATABASE secret is not set"
            exit 1
          fi

          # =============================================================================
          # CORE SERVICES - Required variables
          # =============================================================================
          
          # OpenAI Configuration
          sed -i "s|OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|g" tests/config/.env.test

          # QDrant Configuration
          sed -i "s|QDRANT_URL=.*|QDRANT_URL=${{ secrets.QDRANT_URL }}|g" tests/config/.env.test
          sed -i "s|QDRANT_API_KEY=.*|QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}|g" tests/config/.env.test
          sed -i "s|QDRANT_COLLECTION_NAME=.*|QDRANT_COLLECTION_NAME=${{ secrets.QDRANT_COLLECTION_NAME }}|g" tests/config/.env.test

          # =============================================================================
          # EMBEDDING SERVICE CONFIGURATION
          # =============================================================================
          
          # Embedding Provider Settings
          sed -i "s|EMBEDDING_PROVIDER=.*|EMBEDDING_PROVIDER=${{ secrets.EMBEDDING_PROVIDER }}|g" tests/config/.env.test
          sed -i "s|EMBEDDING_ENDPOINT=.*|EMBEDDING_ENDPOINT=${{ secrets.EMBEDDING_ENDPOINT }}|g" tests/config/.env.test
          sed -i "s|EMBEDDING_MODEL=.*|EMBEDDING_MODEL=${{ secrets.EMBEDDING_MODEL }}|g" tests/config/.env.test
          sed -i "s|EMBEDDING_TOKENIZER=.*|EMBEDDING_TOKENIZER=${{ secrets.EMBEDDING_TOKENIZER }}|g" tests/config/.env.test
          sed -i "s|EMBEDDING_VECTOR_SIZE=.*|EMBEDDING_VECTOR_SIZE=${{ secrets.EMBEDDING_VECTOR_SIZE }}|g" tests/config/.env.test
          sed -i "s|EMBEDDING_API_KEY=.*|EMBEDDING_API_KEY=${{ secrets.EMBEDDING_API_KEY }}|g" tests/config/.env.test

          # =============================================================================
          # NEO4J CONFIGURATION
          # =============================================================================
          
          # Neo4j Database Configuration
          sed -i "s|NEO4J_URI=.*|NEO4J_URI=${{ secrets.NEO4J_URI }}|g" tests/config/.env.test
          sed -i "s|NEO4J_USER=.*|NEO4J_USER=${{ secrets.NEO4J_USER }}|g" tests/config/.env.test
          sed -i "s|NEO4J_PASSWORD=.*|NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}|g" tests/config/.env.test
          sed -i "s|NEO4J_DATABASE=.*|NEO4J_DATABASE=${{ secrets.NEO4J_DATABASE }}|g" tests/config/.env.test

          # =============================================================================
          # GRAPHITI CONFIGURATION
          # =============================================================================
          
          # Graphiti LLM Configuration
          sed -i "s|GRAPHITI_LLM_PROVIDER=.*|GRAPHITI_LLM_PROVIDER=${{ secrets.GRAPHITI_LLM_PROVIDER }}|g" tests/config/.env.test
          sed -i "s|GRAPHITI_LLM_MODEL=.*|GRAPHITI_LLM_MODEL=${{ secrets.GRAPHITI_LLM_MODEL }}|g" tests/config/.env.test
          sed -i "s|GRAPHITI_LLM_API_KEY=.*|GRAPHITI_LLM_API_KEY=${{ secrets.GRAPHITI_LLM_API_KEY }}|g" tests/config/.env.test
          sed -i "s|GRAPHITI_LLM_ENDPOINT=.*|GRAPHITI_LLM_ENDPOINT=${{ secrets.GRAPHITI_LLM_ENDPOINT }}|g" tests/config/.env.test

          # Graphiti Embedder Configuration
          sed -i "s|GRAPHITI_EMBEDDER_PROVIDER=.*|GRAPHITI_EMBEDDER_PROVIDER=${{ secrets.GRAPHITI_EMBEDDER_PROVIDER }}|g" tests/config/.env.test
          sed -i "s|GRAPHITI_EMBEDDER_MODEL=.*|GRAPHITI_EMBEDDER_MODEL=${{ secrets.GRAPHITI_EMBEDDER_MODEL }}|g" tests/config/.env.test
          sed -i "s|GRAPHITI_EMBEDDER_API_KEY=.*|GRAPHITI_EMBEDDER_API_KEY=${{ secrets.GRAPHITI_EMBEDDER_API_KEY }}|g" tests/config/.env.test
          sed -i "s|GRAPHITI_EMBEDDER_ENDPOINT=.*|GRAPHITI_EMBEDDER_ENDPOINT=${{ secrets.GRAPHITI_EMBEDDER_ENDPOINT }}|g" tests/config/.env.test

          # =============================================================================
          # FILE CONVERSION CONFIGURATION
          # =============================================================================
          
          # MarkItDown LLM Configuration
          sed -i "s|MARKITDOWN_LLM_MODEL=.*|MARKITDOWN_LLM_MODEL=${{ secrets.MARKITDOWN_LLM_MODEL }}|g" tests/config/.env.test  
          sed -i "s|MARKITDOWN_LLM_ENDPOINT=.*|MARKITDOWN_LLM_ENDPOINT=${{ secrets.MARKITDOWN_LLM_ENDPOINT }}|g" tests/config/.env.test
          sed -i "s|MARKITDOWN_LLM_API_KEY=.*|MARKITDOWN_LLM_API_KEY=${{ secrets.MARKITDOWN_LLM_API_KEY }}|g" tests/config/.env.test

          # =============================================================================
          # STATE MANAGEMENT CONFIGURATION
          # =============================================================================
          
          # State Database Configuration
          sed -i "s|STATE_DB_PATH=.*|STATE_DB_PATH=${{ secrets.STATE_DB_PATH }}|g" tests/config/.env.test

          # =============================================================================
          # VALIDATION ENGINE CONFIGURATION
          # =============================================================================
          
          # Notification Configuration
          sed -i "s|SMTP_SERVER=.*|SMTP_SERVER=${{ secrets.SMTP_SERVER }}|g" tests/config/.env.test
          sed -i "s|NOTIFICATION_FROM_EMAIL=.*|NOTIFICATION_FROM_EMAIL=${{ secrets.NOTIFICATION_FROM_EMAIL }}|g" tests/config/.env.test
          sed -i "s|ADMIN_EMAIL=.*|ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}|g" tests/config/.env.test
          sed -i "s|SLACK_WEBHOOK_URL=.*|SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}|g" tests/config/.env.test
          sed -i "s|WEBHOOK_ENDPOINT=.*|WEBHOOK_ENDPOINT=${{ secrets.WEBHOOK_ENDPOINT }}|g" tests/config/.env.test
          sed -i "s|WEBHOOK_TOKEN=.*|WEBHOOK_TOKEN=${{ secrets.WEBHOOK_TOKEN }}|g" tests/config/.env.test
          sed -i "s|MANAGER_EMAIL=.*|MANAGER_EMAIL=${{ secrets.MANAGER_EMAIL }}|g" tests/config/.env.test
          sed -i "s|DIRECTOR_EMAIL=.*|DIRECTOR_EMAIL=${{ secrets.DIRECTOR_EMAIL }}|g" tests/config/.env.test

          # =============================================================================
          # TEST DATA SOURCES - Optional secrets
          # =============================================================================
          
          # GitHub Configuration
          if [ -n "${{ secrets.REPO_TOKEN }}" ]; then
            sed -i "s|REPO_TOKEN=.*|REPO_TOKEN=${{ secrets.REPO_TOKEN }}|g" tests/config/.env.test
          fi
          if [ -n "${{ secrets.REPO_URL }}" ]; then
            sed -i "s|REPO_URL=.*|REPO_URL=${{ secrets.REPO_URL }}|g" tests/config/.env.test
          fi

          # Confluence Configuration
          if [ -n "${{ secrets.CONFLUENCE_TOKEN }}" ]; then
            sed -i "s|CONFLUENCE_TOKEN=.*|CONFLUENCE_TOKEN=${{ secrets.CONFLUENCE_TOKEN }}|g" tests/config/.env.test
          fi
          if [ -n "${{ secrets.CONFLUENCE_EMAIL }}" ]; then
            sed -i "s|CONFLUENCE_EMAIL=.*|CONFLUENCE_EMAIL=${{ secrets.CONFLUENCE_EMAIL }}|g" tests/config/.env.test
          fi
          if [ -n "${{ secrets.CONFLUENCE_URL }}" ]; then
            sed -i "s|CONFLUENCE_URL=.*|CONFLUENCE_URL=${{ secrets.CONFLUENCE_URL }}|g" tests/config/.env.test
          fi
          if [ -n "${{ secrets.CONFLUENCE_SPACE_KEY }}" ]; then
            sed -i "s|CONFLUENCE_SPACE_KEY=.*|CONFLUENCE_SPACE_KEY=${{ secrets.CONFLUENCE_SPACE_KEY }}|g" tests/config/.env.test
          fi

          # JIRA Configuration
          if [ -n "${{ secrets.JIRA_TOKEN }}" ]; then
            sed -i "s|JIRA_TOKEN=.*|JIRA_TOKEN=${{ secrets.JIRA_TOKEN }}|g" tests/config/.env.test
          fi
          if [ -n "${{ secrets.JIRA_EMAIL }}" ]; then
            sed -i "s|JIRA_EMAIL=.*|JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}|g" tests/config/.env.test
          fi
          if [ -n "${{ secrets.JIRA_URL }}" ]; then
            sed -i "s|JIRA_URL=.*|JIRA_URL=${{ secrets.JIRA_URL }}|g" tests/config/.env.test
          fi
          if [ -n "${{ secrets.JIRA_PROJECT_KEY }}" ]; then
            sed -i "s|JIRA_PROJECT_KEY=.*|JIRA_PROJECT_KEY=${{ secrets.JIRA_PROJECT_KEY }}|g" tests/config/.env.test
          fi

          echo "Created .env.test file successfully"
          echo "Contents (with secrets masked):"
          sed 's/=.*/=***/' tests/config/.env.test

      - name: Verify test configuration files exist
        run: |
          cd packages/qdrant-loader

          echo "Verifying test configuration files..."

          # Check if multi-file configuration exists
          if [ -d "tests/config" ]; then
            echo "✅ Multi-file configuration directory found"
            ls -la tests/config/
            
            # Verify the key configuration files exist
            for config_file in connectivity.yaml fine-tuning.yaml projects.yaml; do
              if [ -f "tests/config/$config_file" ]; then
                echo "✅ Found tests/config/$config_file"
              else
                echo "❌ Missing tests/config/$config_file"
                exit 1
              fi
            done
          else
            echo "❌ tests/config directory not found"
            exit 1
          fi

          echo "Configuration verification completed successfully"
          echo "Environment variables will be substituted at runtime by the config loader"

      - name: Run loader tests and generate coverage reports
        run: |
          cd packages/qdrant-loader
          python -m pytest tests/ --cov=src --cov-report=xml:../../coverage-loader.xml --junitxml=../../junit-loader.xml --cov-report=html:../../htmlcov-loader -o junit_family=legacy -v

      - name: Upload loader coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-loader-${{ github.run_id }}
          path: |
            htmlcov-loader
            coverage-loader.xml
            junit-loader.xml
          retention-days: 30

  test-mcp-server:
    name: Test MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/qdrant-loader[dev]
          pip install -e packages/qdrant-loader-mcp-server[dev]

      - name: Run MCP server tests and generate coverage reports
        run: |
          cd packages/qdrant-loader-mcp-server
          python -m pytest tests/ --cov=src --cov-report=xml:../../coverage-mcp.xml --junitxml=../../junit-mcp.xml --cov-report=html:../../htmlcov-mcp -o junit_family=legacy -v
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_COLLECTION_NAME: ${{ secrets.QDRANT_COLLECTION_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}

      - name: Upload MCP server coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mcp-${{ github.run_id }}
          path: |
            htmlcov-mcp
            coverage-mcp.xml
            junit-mcp.xml
          retention-days: 30

  test-website:
    name: Test Website Build System
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies for website testing
        run: |
          # Install system dependencies that might be needed for favicon generation
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository1.0-dev

      - name: Install website test dependencies
        run: |
          python -m pip install --upgrade pip
          # Install dev dependencies from root pyproject.toml which includes requests, responses, and other test dependencies
          pip install -e .[dev]
          # Install optional docs dependencies for comprehensive testing
          pip install -e .[docs] || echo "Optional docs dependencies not available"

      - name: Run website tests with coverage
        run: |
          # Add website directory to Python path and run tests
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/website"
          python -m pytest tests/ --cov=website --cov-report=xml:coverage-website.xml --cov-report=html:htmlcov-website --cov-report=term-missing  --junitxml=junit-website.xml -o junit_family=legacy -v

      - name: Upload website test coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-website-${{ github.run_id }}
          path: |
            htmlcov-website
            coverage-website.xml
            junit-website.xml
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-loader, test-mcp-server, test-website]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "=== Test Results Summary ==="
          echo "QDrant Loader Tests: ${{ needs.test-loader.result }}"
          echo "MCP Server Tests: ${{ needs.test-mcp-server.result }}"
          echo "Website Build Tests: ${{ needs.test-website.result }}"

          if [ "${{ needs.test-loader.result }}" != "success" ] || [ "${{ needs.test-mcp-server.result }}" != "success" ] || [ "${{ needs.test-website.result }}" != "success" ]; then
            echo "❌ Some tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi

      - name: Create test status artifact
        run: |
          mkdir -p test-results
          echo "{
            \"loader_status\": \"${{ needs.test-loader.result }}\",
            \"mcp_status\": \"${{ needs.test-mcp-server.result }}\",
            \"website_status\": \"${{ needs.test-website.result }}\",
            \"overall_status\": \"${{ (needs.test-loader.result == 'success' && needs.test-mcp-server.result == 'success' && needs.test-website.result == 'success') && 'success' || 'failure' }}\",
            \"run_id\": \"${{ github.run_id }}\",
            \"commit_sha\": \"${{ github.sha }}\",
            \"branch\": \"${{ github.ref_name }}\",
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }" > test-results/status.json

          echo "Test run completed at $(date)" > test-results/summary.txt
          echo "Run ID: ${{ github.run_id }}" >> test-results/summary.txt
          echo "Commit: ${{ github.sha }}" >> test-results/summary.txt
          echo "Branch: ${{ github.ref_name }}" >> test-results/summary.txt
          echo "Loader Tests: ${{ needs.test-loader.result }}" >> test-results/summary.txt
          echo "MCP Server Tests: ${{ needs.test-mcp-server.result }}" >> test-results/summary.txt
          echo "Website Tests: ${{ needs.test-website.result }}" >> test-results/summary.txt

      - name: Upload test status artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-status-${{ github.run_id }}
          path: test-results/
          retention-days: 30

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test-loader, test-mcp-server, test-website]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download loader coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-loader-${{ github.run_id }}
          path: coverage-artifacts/loader

      - name: Download MCP server coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-mcp-${{ github.run_id }}
          path: coverage-artifacts/mcp

      - name: Download website coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-website-${{ github.run_id }}
          path: coverage-artifacts/website

      - name: List coverage files
        run: |
          echo "=== Coverage files found ==="
          find coverage-artifacts/ -name "*.xml" -exec ls -la {} \;

          echo "=== Copying coverage files to root ==="
          find coverage-artifacts/ -name "*.xml" -exec cp {} . \;
          ls -la *.xml || echo "No XML files found"

      - name: Upload loader coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: loader
          files: junit-loader.xml
          name: loader-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload MCP server coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: mcp
          files: junit-mcp.xml
          name: mcp-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload website coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: website
          files: junit-website.xml
          name: website-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload combined coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit-loader.xml,junit-mcp.xml,junit-website.xml
          fail_ci_if_error: true
          verbose: true
