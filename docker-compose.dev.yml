# Development override for docker-compose.yml
# This file provides development-specific configurations including:
# - Mount entire project including venv for instant development
# - Use existing local virtual environment inside Docker
# - Development environment variables
# - Relaxed health checks for faster startup

services:
  # QDrant Loader Application - Development Configuration
  qdrant-loader:
    build:
      context: ./packages/qdrant-loader
      dockerfile: Dockerfile.dev
    volumes:
      # Mount entire project root (including venv)
      - .:/workspace:rw
    working_dir: /workspace
    environment:
      - PYTHONPATH=/workspace
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password123}
      - LOG_LEVEL=DEBUG
    # Override entrypoint to use local venv
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "if [ -d venv ]; then 
         source venv/bin/activate && 
         cd packages/qdrant-loader && 
         pip install -e . && 
         echo 'QDrant Loader installed in development mode' &&
         tail -f /dev/null
       else 
         echo 'No venv found. Run: make setup-dev && make install-dev first'
         exit 1
       fi"
    depends_on:
      - qdrant
      - neo4j
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "source /workspace/venv/bin/activate && qdrant-loader --help",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MCP Server - Development Configuration
  mcp-server:
    build:
      context: ./packages/qdrant-loader-mcp-server
      dockerfile: Dockerfile.dev
    volumes:
      # Mount entire project root (including venv)
      - .:/workspace:rw
    working_dir: /workspace
    environment:
      - PYTHONPATH=/workspace
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password123}
      - MCP_SERVER_PORT=${MCP_SERVER_PORT:-3000}
      - LOG_LEVEL=DEBUG
    # Override entrypoint to use local venv
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "if [ -d venv ]; then 
         source venv/bin/activate && 
         cd packages/qdrant-loader-mcp-server && 
         pip install -e . && 
         echo 'MCP Server installed in development mode' &&
         tail -f /dev/null
       else 
         echo 'No venv found. Run: make setup-dev && make install-dev first'
         exit 1
       fi"
    depends_on:
      - qdrant
      - neo4j
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "source /workspace/venv/bin/activate && mcp-qdrant-loader --help",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # QDrant Vector Database - Development Configuration
  qdrant:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
