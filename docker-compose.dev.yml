# Development override for docker-compose.yml
# This file provides development-specific configurations including:
# - Mount source code for instant development
# - Use container's optimized virtual environment
# - Development environment variables
# - Relaxed health checks for faster startup

services:
  # QDrant Loader Application - Development Configuration
  qdrant-loader:
    build:
      context: ./packages/qdrant-loader
      dockerfile: Dockerfile.dev
    volumes:
      # Mount only source code for live editing
      - ./packages/qdrant-loader/src:/workspace/src:rw
      - ./packages/qdrant-loader/pyproject.toml:/workspace/pyproject.toml:ro
      - ./packages/qdrant-loader/README.md:/workspace/README.md:ro
      - ${USER_DATA_DIR}:/user_data:rw
    working_dir: /workspace
    environment:
      - PATH=/opt/venv/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      - PYTHONPATH=/workspace/src
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password123}
      - LOG_LEVEL=DEBUG
    # Simple command - dependencies already installed in image
    command:
      - bash
      - -c
      - |
        echo "Container Python: $$(which python)"
        echo "Python version: $$(python --version)"
        echo "Installed packages:"
        pip list | grep qdrant-loader
        echo "Starting development mode..."
        tail -f /dev/null
    depends_on:
      - qdrant
      - neo4j
    healthcheck:
      test: ["CMD", "python", "-c", "import qdrant_loader; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # MCP Server - Development Configuration
  mcp-server:
    build:
      context: ./packages/qdrant-loader-mcp-server
      dockerfile: Dockerfile.dev
    volumes:
      # Mount only source code for live editing
      - ./packages/qdrant-loader-mcp-server/src:/workspace/src:rw
      - ./packages/qdrant-loader-mcp-server/pyproject.toml:/workspace/pyproject.toml:ro
      - ./packages/qdrant-loader-mcp-server/README.md:/workspace/README.md:ro
      - ${USER_DATA_DIR}:/user_data:rw
    working_dir: /workspace
    environment:
      - PATH=/opt/venv/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      - PYTHONPATH=/workspace/src
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password123}
      - MCP_SERVER_PORT=${MCP_SERVER_PORT:-3000}
      - LOG_LEVEL=DEBUG
    # Simple command - dependencies already installed in image
    command:
      - bash
      - -c
      - |
        echo "Container Python: $$(which python)"
        echo "Python version: $$(python --version)"
        echo "Installed packages:"
        pip list | grep qdrant-loader
        echo "Starting MCP server development mode..."
        tail -f /dev/null
    depends_on:
      - qdrant
      - neo4j
    ports:
      - "3000:3000"
    healthcheck:
      test:
        ["CMD", "python", "-c", "import qdrant_loader_mcp_server; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # QDrant Vector Database - Development Configuration
  qdrant:
    healthcheck:
      test:
        [
          "CMD",
          "perl",
          "-e",
          "use IO::Socket::INET; my $$sock = IO::Socket::INET->new(PeerAddr => 'localhost', PeerPort => 6333, Proto => 'tcp', Timeout => 5) or exit 1; print $$sock \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\"; my $$response = <$$sock>; exit($$response =~ /200 OK/ ? 0 : 1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
